<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celestique</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #e9e4dd;
            color: #2c2c2c;
        }

        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif;
        }

        section {
            padding: 80px 10%;
        }

        /* HERO */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
        }

        .hero-text h1 {
            font-size: 80px;
            letter-spacing: 4px;
        }

        .hero-text p {
            margin-top: 20px;
            max-width: 400px;
            opacity: 0.7;
        }

        .btn {
            margin-top: 25px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .hero img {
            width: 350px;
        }

        /* ABOUT */
        .about {
            display: flex;
            gap: 50px;
            align-items: center;
        }

        .about img {
            width: 300px;
            border-radius: 10px;
        }

        .about-text h2 {
            font-size: 60px;
            opacity: 0.2;
        }

        /* PRODUCTS */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .product-card {
            background: #ddd6ce;
            padding: 30px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
        }

        /* LOVED */
        .loved-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .loved-card {
            background: white;
            padding: 10px;
            text-align: center;
        }

        .loved-card img {
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 40px;
            opacity: 0.2;
        }

        /* RESPONSIVE */
        @media(max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .loved-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-text">
            <h1>CELESTIQUE</h1>
            <p>Artisan luxury jewelry crafted with timeless elegance.</p>
            <button class="btn">SHOP NOW</button>
        </div>
        <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d" />
    </section>

    <!-- ABOUT -->
    <section class="about">
        <div class="about-text">
            <h2>ABOUT US</h2>
            <p>
                We create timeless pieces that celebrate beauty and elegance.
            </p>
            <button class="btn">READ MORE</button>
        </div>
        <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7" />
    </section>

    <!-- PRODUCTS -->
    <section>
        <h2 style="font-size:60px; opacity:0.2;">OUR PRODUCTS</h2>
        <div class="products-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a3c6c" />
                <h3>RINGS</h3>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638" />
                <h3>EARRINGS</h3>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1603569283847-aa295f0d016a" />
                <h3>NECKLACES</h3>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f" />
                <h3>BRACELETS</h3>
            </div>
        </div>
    </section>

    <!-- LOVED -->
    <section>
        <h2 style="font-size:60px; opacity:0.2;">MOST LOVED</h2>
        <div class="loved-grid">
            <div class="loved-card"><img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
                <p>$120</p>
            </div>
            <div class="loved-card"><img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
                <p>$140</p>
            </div>
            <div class="loved-card"><img src="https://images.unsplash.com/photo-1603569283847-aa295f0d016a">
                <p>$160</p>
            </div>
            <div class="loved-card"><img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
                <p>$180</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        CELESTIQUE
    </footer>

    <!-- ANIMATIONS -->
    <script>
        gsap.registerPlugin(ScrollTrigger);

        gsap.from(".hero-text", {
            opacity: 0,
            y: 100,
            duration: 1
        });

        gsap.from(".about", {
            scrollTrigger: {
                trigger: ".about",
                start: "top 80%",
                toggleActions: "play reverse play reverse"
            },
            opacity: 0,
            y: 100,
            duration: 1
        });

        gsap.from(".product-card", {
            scrollTrigger: {
                trigger: ".products-grid",
                start: "top 80%",
                toggleActions: "play reverse play reverse"
            },
            opacity: 0,
            y: 80,
            stagger: 0.2
        });

        gsap.from(".loved-card", {
            scrollTrigger: {
                trigger: ".loved-grid",
                start: "top 80%",
                toggleActions: "play reverse play reverse"
            },
            opacity: 0,
            scale: 0.8,
            stagger: 0.2
        });
    </script>

</body>

</html>
